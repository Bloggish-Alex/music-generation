# Hierarchical Music Generation — Style Configuration
#
# These are genuine musical style choices, not derivable from data.
# Use --profile <name> to apply ../config/profiles/<name>.yaml, then optionally
# override any value with --config my_style.yaml.
# Values shown here are neutral defaults; profiles override selected fields.

cadence:
  gap: 0.5                # beats of silence at section boundaries

melody:
  # step_weights: now derived per-cluster from training data (step_histograms)
  step_upward_bias: 0.55  # probability of ascending (0.5 = symmetric)
  register_window: 10     # semitone range per measure (± from centre)
  pc_reject_threshold: 4.0  # if histogram[pc] * this < random, reduce leap

rhythm:
  min_duration: 0.25      # shortest allowed note (quarterLength)
  max_rest_prob: 0.6      # cap on rest probability per note

rhythm_development:
  # Phrase-level rhythm layer.
  # This connects NarrativePlanner/theme memory to the rhythmic surface so the
  # piece does not fall into repeated equal-duration runs followed by the same
  # long pause/closure. It stores first-statement rhythm cells, creates
  # role-aware variants, and scores candidates. It never edits pitch content.
  enabled: true

  # Repeat identity range. Repeated theme bars should remain rhythmically
  # recognizable but not literal. Raise min/max for stricter motif identity;
  # lower them if repeats still sound mechanically copied.
  repeat_identity: [0.70, 0.90]

  # Development identity range. Lower values allow more density/syncopation
  # change in DEVELOPMENT/CLIMAX. Raise if rhythmic identity disappears.
  development_identity: [0.45, 0.78]

  # Cadence identity range. Cadences may lengthen or simplify, but should not
  # always use the exact same long-note/rest shape.
  cadence_identity: [0.35, 0.75]

  # Density/syncopation controls. Increase development_density_lift if
  # development/climax still sound rhythmically flat. Lower cadence_density_scale
  # or raise cadence_lengthen if cadences do not breathe. Raise syncopation_shift
  # cautiously; too much makes the line feel unstable.
  development_density_lift: 0.18
  cadence_density_scale: 0.78
  cadence_lengthen: 0.45
  syncopation_shift: 0.12
  avoid_exact_repeat: true

  # Scoring weights. consecutive_repeat_weight penalizes the same duration
  # pattern appearing in adjacent bars. identity_weight keeps repeats related
  # to the source rhythm. copy_weight discourages exact replay when development
  # is expected. phrase_contour_weight rewards role-appropriate density or
  # cadence lengthening.
  identity_weight: 1.00
  copy_weight: 1.10
  consecutive_repeat_weight: 0.75
  phrase_contour_weight: 0.45

  # Learned rhythm prior. This is trained from corpus rhythm cells against
  # rhythm-only perturbations, then used as a soft candidate-selection signal.
  # Increase learned_prior_weight if generated rhythm still sounds like a
  # repeated template. Lower it if rhythm becomes too conservative or rejects
  # useful generated variation. Keep this modest: it should guide selection,
  # not override phrase/narrative intent.
  learned_prior_enabled: true
  learned_prior_weight: 0.25
  learned_prior_logit_clip: 2.0

velocity:
  peak_mean: 100
  peak_std: 8
  trough_mean: 55
  trough_std: 10
  peak_frac_min: 0.25     # where the peak hits in the bar
  peak_frac_max: 0.55

harmony:
  # Optional harmonic planning layer.
  # Set enabled: false to bypass the module and return to the previous
  # melody/theme-only path. When enabled, each bar receives a functional
  # Roman-numeral context used by candidate scoring and, optionally, bass.
  enabled: true
  # mode:
  #   auto    = use LearnedHarmonicModel when the trained model contains one,
  #             otherwise fall back to the rule progression below.
  #   learned = require learned harmony when available; warn and fall back if
  #             loading an older model without harmony/harmony.json.
  #   rule    = ignore learned harmony and use the progression below.
  mode: auto
  diagnostics: true       # write <output>.harmony.json after each generation

  # Harmony-aware melody realization generates extra local candidates when a
  # bar has a harmony target. Increase these if the diagnostics still show low
  # strong-beat chord-tone ratios; lower them if generation becomes too slow.
  candidate_count_multiplier: 1.5
  cadence_candidate_count_multiplier: 2.5

  # Reused motif/return bars are harder because theme identity can conflict
  # with the current harmony. These multipliers give the return-motif sampler
  # more variants to choose from before applying the harmony-aware score.
  return_candidate_count_multiplier: 1.6
  cadence_return_candidate_count_multiplier: 2.2

  # Extra candidate budget for high-risk returned/repeated material. This does
  # not change scoring or repair notes; it only gives the existing scorers more
  # options in narrative regions where theme identity, dual-theme development,
  # and harmony often conflict.
  weak_context_candidate_boost:
    enabled: true
    multiplier: 1.6
    max_candidates: 24
    narrative_roles: [DEVELOPMENT, CLIMAX, RECAP]

  # Default phrase-level harmonic rhythm. The planner maps local phrase
  # position onto this progression, then forces penultimate bars toward V and
  # final bars toward I. Use simpler progressions for classical/baroque styles;
  # add more predominant/dominant motion for romantic tension.
  progression: [I, vi, IV, V]
  cadence:
    final: I
    # Chords allowed to close a structural cadence. Keep this narrow for
    # common-practice tonal music. ii/IV should normally be cadence preparation,
    # not the endpoint; widening this makes section endings less decisive.
    allowed_endpoints: [I, V]

  # Strong-beat chord tone scoring. In 4/4, beats 1 and 3 are treated as
  # structurally strong. Increase tolerance if generated onsets are loose.
  strong_beats: [0.0, 2.0]
  strong_beat_tolerance: 0.08

  # Soft scoring weights. Raise these if the music sounds harmonically vague;
  # lower them if melody becomes too constrained or too chord-tone heavy.
  scoring:
    chord_tone_ratio: 1.00
    strong_beat_chord_tone: 1.80
    cadence_fit: 2.20
    unresolved_dissonance: 0.70
    non_chord_resolution: 0.85

  # Final realization nudges structurally important melody notes toward the
  # chosen harmony after motif/register shaping. This is deliberately a nudge,
  # not a full rewrite, so the Markov texture and theme identity survive.
  #
  # strong_beat_chord_tone_strength: attraction for notes on strong beats.
  # Raise if bars sound harmonically unclear; lower if melody becomes arpeggiated.
  #
  # cadence_final_chord_tone_strength: attraction for the last melody note in
  # cadence bars. Keep high for classical closure; lower for freer styles.
  #
  # max_pitch_adjust: largest semitone correction allowed. Raise if diagnostics
  # still show bad cadences; lower if melodic shape is being distorted.
  #
  # prefer_root_on_final_cadence: true makes final cadence notes prefer the
  # chord root, especially useful for I endings.
  realization:
    strong_beat_chord_tone_strength: 0.65
    cadence_final_chord_tone_strength: 0.95
    max_pitch_adjust: 5
    prefer_root_on_final_cadence: true

    # Non-chord tones are allowed when they behave like passing/neighbor tones.
    # This block only nudges notes that are not stepwise-resolved. Raise the
    # strengths if diagnostics show high non_chord_resolution_cost; lower them
    # if the melody loses expressive chromatic motion.
    non_chord_resolution:
      enabled: true
      weak_note_chord_tone_strength: 0.30
      cadence_weak_note_strength: 0.50
      max_pitch_adjust: 3
      preserve_stepwise_passing_tones: true

  # Last-resort repair for reused/returned motif bars. It only runs when a
  # selected return candidate still fails harmony diagnostics, then creates an
  # extra candidate with stronger projection of unresolved non-chord tones.
  # Raise projection_strength or max_pitch_adjust if a few repeat bars remain
  # badly mismatched; lower them if repeat identity becomes too altered.
  adaptive_repair:
    enabled: false
    score_threshold: -1.0
    chord_tone_ratio_threshold: 0.30
    non_chord_resolution_threshold: 0.85
    projection_strength: 0.82
    max_pitch_adjust: 5
    preserve_stepwise_passing_tones: true

  # Harmonic bass replaces the old sampled bass only when harmony.enabled is
  # true. root_weight near 1.0 gives stable root-position bass; lower values
  # allow more fifths and lighter motion.
  bass:
    enabled: true
    low: 36
    high: 60
    reference: 45
    root_weight: 0.78
    sustain_fraction: 0.88
    velocity_scale: 0.66

structure:
  grid_size: 4             # snap section starts to N-bar boundaries
  max_grid_pad: 3          # max bars padded to reach grid
  multi_family_preference: 0.7  # probability of using multi-family template
  grid_weights: [7, 2, 1]  # [grid-aligned, mostly-grid, irregular] template ratio

variation:
  progression_denominator: 3  # k/(k+N) curve steepness
  min_strength: 0.02      # below this, skip transforms

theme_development:
  # Theme development controls how repeated section families evolve.
  # It is intentionally role-based rather than tied to a single composer:
  # profiles can reorder the return_arc or adjust role parameters without
  # changing code.
  #
  # statement_role: role assigned to a theme's first full appearance.
  # repeat_role: role assigned to immediate/literal structural repeats.
  # return_arc: roles assigned to later returns of the same theme family.
  # final_role: role used when a theme occurrence reaches the end of the piece.
  # late_cadential_threshold: after this normalized position, late_role may
  # replace the normal return_arc role to encourage closure.
  statement_role: STATEMENT
  repeat_role: REPEAT
  return_arc: [REPEAT, SEQUENCE_UP, FRAGMENT, INTENSIFY, CADENTIAL]
  final_role: CADENTIAL
  late_role: CADENTIAL
  late_cadential_threshold: 0.86
  force_cadential_last_bar: true

  # Role parameters:
  # similarity_target is the desired contour/rhythm relatedness to the theme.
  # Raise both values for more literal recurrence; lower them for freer
  # development. A wide range lets local Markov style decide more.
  #
  # strength_scale multiplies motif variation strength for this role.
  # Increase if returns are too static; decrease if theme identity weakens.
  #
  # register_shift moves the role's register target in semitones.
  # Positive values usually intensify; negative values relax.
  #
  # target_attraction controls how strongly altered notes move toward the
  # skeleton target pitch. Higher = clearer direction/cadence; lower = freer.
  #
  # rhythm_change_scale controls how much short-note rhythm may change.
  # Higher = more development; lower = stronger rhythmic identity.
  roles:
    STATEMENT:
      similarity_target: [0.80, 1.00]
      strength_scale: 0.00
      register_shift: 0
      target_attraction: 0.50
      rhythm_change_scale: 0.60
    REPEAT:
      similarity_target: [0.82, 0.95]
      strength_scale: 0.75
      register_shift: 0
      target_attraction: 0.55
      rhythm_change_scale: 0.65
      exact_copy_penalty_scale: 1.10
    SEQUENCE_UP:
      similarity_target: [0.62, 0.86]
      strength_scale: 1.15
      register_shift: 2
      sequence_step_per_bar: 1.0
      target_attraction: 0.62
      rhythm_change_scale: 0.75
      exact_copy_penalty_scale: 1.25
    SEQUENCE_DOWN:
      similarity_target: [0.62, 0.86]
      strength_scale: 1.15
      register_shift: -2
      sequence_step_per_bar: 1.0
      target_attraction: 0.62
      rhythm_change_scale: 0.75
      exact_copy_penalty_scale: 1.25
    FRAGMENT:
      similarity_target: [0.42, 0.72]
      strength_scale: 1.35
      register_shift: 0
      target_attraction: 0.48
      rhythm_change_scale: 1.10
      exact_copy_penalty_scale: 1.45
    EXTENSION:
      similarity_target: [0.55, 0.82]
      strength_scale: 1.10
      register_shift: 1
      target_attraction: 0.58
      rhythm_change_scale: 0.90
      exact_copy_penalty_scale: 1.20
    INTENSIFY:
      similarity_target: [0.50, 0.80]
      strength_scale: 1.30
      register_shift: 4
      target_attraction: 0.65
      rhythm_change_scale: 1.00
      tension_scale: 1.12
      intensity_scale: 1.08
      exact_copy_penalty_scale: 1.35
    RELAX:
      similarity_target: [0.52, 0.82]
      strength_scale: 0.95
      register_shift: -3
      target_attraction: 0.52
      rhythm_change_scale: 0.80
      tension_scale: 0.86
      intensity_scale: 0.88
      exact_copy_penalty_scale: 1.10
    CADENTIAL:
      similarity_target: [0.38, 0.72]
      strength_scale: 1.05
      register_shift: -2
      target_attraction: 0.80
      rhythm_change_scale: 0.55
      cadence_strength_add: 0.25
      tension_scale: 0.78
      intensity_scale: 0.88
      exact_copy_penalty_scale: 1.30

development_scorer:
  # Soft scoring layer for developed theme-return candidates.
  # Unlike hard rules, this does not edit or clamp notes. It generates several
  # variants, scores them against learned cluster priors plus musical targets,
  # and keeps the best candidate.
  #
  # candidate_count: candidates per recalled motif bar. Increase for better
  # musical selection at higher CPU cost; decrease for faster generation.
  candidate_count: 5

  # Weights control preference strength in candidate selection.
  # style: fit to learned interval distribution from training data.
  # pitch_pc: fit to learned pitch-class distribution from training data.
  # harmony: fit to the current harmonic context after return-motif variation.
  #          Raise if repeated/returned themes ignore harmony; lower if theme
  #          identity becomes too weak or too chord-tone heavy.
  # leap: penalize unlikely or excessive melodic leaps.
  # register: penalize unexplained register jumps from the previous bar and
  #           drift away from the skeleton register target.
  # direction: reward role-appropriate direction, e.g. sequence up/down.
  # cadence: reward final pitch/duration fit for cadential roles.
  # similarity: keep role-specific similarity within the target range.
  # exact_copy: penalize literal replay when the role calls for development.
  weights:
    style: 0.85
    pitch_pc: 0.35
    harmony: 1.15
    leap: 0.85
    register: 0.55
    direction: 0.45
    cadence: 0.70
    similarity: 0.65
    exact_copy: 0.55

  # Role allowances decide when a big move is considered musically plausible.
  # leap_allowance above 1.0 makes large intervals less costly for that role.
  # register_jump_allowance is the tolerated mean-register movement from the
  # previous bar before a soft penalty starts.
  roles:
    REPEAT:
      leap_allowance: 0.75
      register_jump_allowance: 4.0
    SEQUENCE_UP:
      leap_allowance: 1.10
      register_jump_allowance: 7.0
    SEQUENCE_DOWN:
      leap_allowance: 1.10
      register_jump_allowance: 7.0
    FRAGMENT:
      leap_allowance: 0.95
      register_jump_allowance: 6.0
    EXTENSION:
      leap_allowance: 1.00
      register_jump_allowance: 6.0
    INTENSIFY:
      leap_allowance: 1.25
      register_jump_allowance: 8.0
    RELAX:
      leap_allowance: 0.90
      register_jump_allowance: 5.0
    CADENTIAL:
      leap_allowance: 0.85
      register_jump_allowance: 5.0

conditional_note_model:
  # Learned conditional prior for note selection.
  # This model is trained from the corpus and scores candidates by how their
  # melody notes relate to the current harmony under the current cluster/role,
  # beat-strength, and previous-note-relation context. It does not edit notes;
  # it only helps choose among generated candidates.
  enabled: true

  # candidate_score_weight affects newly sampled bars.
  # return_score_weight affects reused/returned motif bars, where theme
  # identity and harmony often conflict. Raise these if diagnostics show
  # persistent harmony mismatch; lower them if generated melodies become too
  # conservative or too chord-tone heavy.
  candidate_score_weight: 0.85
  return_score_weight: 0.95

  # Diagnostics-as-objective: these are soft candidate-selection targets, not
  # hard repairs. The scorer rewards candidates that approach these targets
  # while still respecting learned relation priors.
  diagnostic_targets:
    chord_tone_ratio_target: 0.58
    chord_tone_ratio: 0.35
    strong_beat_chord_tone_target: 0.88
    strong_beat_chord_tone: 0.65
    non_chord_resolution: 0.55

candidate_reranker:
  # Learned candidate naturalness/style prior.
  #
  # Training creates positive examples from real corpus bars and negative
  # examples from perturbed versions of those bars. During generation, the
  # reranker scores each candidate and adds a soft logit reward/penalty to the
  # existing candidate score. It never edits notes and should be treated as a
  # data-informed selection prior, not a repair rule.
  #
  # enabled: false returns to the pre-reranker path.
  # weight: strength of the learned prior. Keep conservative for v1/v2 because
  #   the reranker learns from synthetic negatives. Raise slowly if selected
  #   candidates still sound locally unnatural despite good diagnostics. Lower
  #   if the model becomes too conservative or rejects expressive outliers.
  # logit_clip: caps the learned model's influence so it cannot dominate
  #   harmony/theme/development scorers on a single confident prediction.
  # diagnostics: write reranker_score and selected/alternative stats into
  #   <output>.harmony.json so reports can compare old and new selection.
  enabled: true
  weight: 0.35
  logit_clip: 2.5
  diagnostics: true
  calibration:
    # Role-conditioned calibration maps raw reranker probability to a usable
    # generation score. This prevents synthetic-negative training from giving
    # severe penalties to diagnostically strong cadence closures. It does not
    # edit notes or force a cadence; it only limits how much the learned prior
    # may distrust an otherwise well-resolved cadence.
    enabled: true

    # When cadence diagnostics are strong, reranker logit will not be allowed
    # below this floor. Lower values let the reranker remain more skeptical;
    # higher values protect cadence closure more strongly.
    cadence_min_logit_when_good: -0.20

    # Smooth centers used to estimate whether a cadence is diagnostically good.
    # Raise harmony_score/chord_tone_ratio to make protection stricter. Lower
    # resolution/unresolved costs to require cleaner non-chord handling.
    good_cadence_harmony_score: 2.0
    good_cadence_chord_tone_ratio: 0.80
    good_cadence_resolution_cost: 0.12
    good_cadence_unresolved_cost: 0.12

narrative:
  # Piece-level dramatic form planner. This layer does not edit notes; it
  # assigns each bar a macro role so repeated themes can carry different
  # dramatic functions across the piece.
  enabled: true

  # Normalized positions of macro form regions. Move climax_position later for
  # a longer buildup; earlier for a more compact dramatic arc. coda_position
  # controls when the final release begins.
  contrast_position: 0.24
  development_position: 0.42
  climax_position: 0.72
  recap_position: 0.84
  coda_position: 0.94

  # V2 timeline rebalancing. When the selected grammar template overuses the
  # primary theme, replace a limited amount of FREE connective material in
  # contrast/development regions with secondary-theme material. This increases
  # narrative contrast without rewriting the whole form.
  timeline_rebalance:
    enabled: true
    min_secondary_ratio: 0.16
    max_replaced_ratio: 0.18
    secondary_regions: [CONTRAST, DEVELOPMENT, CLIMAX]

dual_theme_development:
  # Continuous A/B-theme relationship layer.
  # It compares learned theme identities and skeletons, then softly biases
  # register, tension, similarity freedom, and motif-development strength.
  # It does not force a role such as conflict/resolution and it never edits
  # notes directly; it only changes candidate targets before scoring.
  enabled: true

  # Raise influence when returned themes still feel unrelated after the second
  # theme has appeared. Lower it if A and B identities blur into each other.
  influence: 0.42

  # The layer activates only after at least two theme identities have enough
  # learned material. Raise this to be more conservative; lower it if short
  # themes should start interacting earlier.
  min_partner_confidence: 0.32

  # Couplings convert measured A/B differences into target shifts.
  # register_coupling: higher makes later returns borrow more of the partner
  # register area; lower keeps each theme in its original register world.
  # tension_coupling: higher makes themes borrow more of each other's tension
  # profile; lower keeps tension controlled by the global narrative planner.
  register_coupling: 0.30
  tension_coupling: 0.34

  # similarity_freedom widens the allowed contour/rhythm similarity band when
  # two themes are contrasting. Raise if returns are too literal; lower if theme
  # identity is becoming hard to recognize.
  similarity_freedom: 0.22

  # Positive values let affinity pull targets tighter; contrast makes targets
  # freer. Lower this if candidate selection becomes too sensitive.
  target_attraction_scale: 0.10

  candidate_scoring:
    # V1.5 scorer. This remains non-destructive: it only scores return-motif
    # candidates against both the source theme bar and the partner-theme bar.
    # Disable it if you want the older v1 behavior where dual-theme only
    # changes bar targets indirectly.
    enabled: true

    # Overall strength of partner-aware candidate selection. Raise if A/B still
    # sound unrelated after both themes have appeared; lower if returns become
    # too blended or lose their original identity.
    weight: 1.65

    # partner_echo_weight rewards candidates that carry contour/rhythm/register
    # traces of the partner theme in proportion to the measured blend.
    partner_echo_weight: 0.42

    # source_retention_weight keeps the current theme recognizable while it is
    # being transformed by the partner. Raise this if identity gets weak.
    source_retention_weight: 0.34

    # blended_anchor_weight rewards candidates whose mean register sits between
    # the source and partner bars according to the learned relation.
    blended_anchor_weight: 0.24

    # exact_copy_weight penalizes literal copies of either source or partner.
    # Raise if repeats still sound pasted; lower if motifs become too unstable.
    exact_copy_weight: 0.22

    # Partner/source targets shape how much of the other theme should be heard
    # in a developed candidate. These are continuous scoring targets, not
    # rules. Raise partner_target_* if A/B still feel unrelated; lower them if
    # the current theme identity disappears. Raise source_target_base for more
    # recognizable returns; raise source_target_transform_relief to allow more
    # departure during development/climax.
    partner_target_base: 0.26
    partner_target_blend: 0.72
    partner_target_transform: 0.42
    partner_target_contrast: 0.20
    source_target_base: 0.72
    source_target_transform_relief: 0.34

    # Target widths control how tolerant the scorer is when the selected
    # candidate is more/less source-like or partner-like than the desired
    # continuous target. Narrower widths make the relationship target sharper;
    # wider widths allow more accidental variation.
    partner_target_width: 0.26
    source_target_width: 0.26

    # Damp dual-theme reward when the same candidate has weak harmony fit.
    # This keeps theme relationship scoring from selecting bars that develop
    # well motivically but obscure the current harmony. It only changes
    # candidate ranking.
    harmony_damping_enabled: true
    harmony_damping_floor: 0.25
    harmony_damping_start: -0.10
    harmony_damping_full: 0.45

  proposal:
    # V1.1 proposal layer. It adds a few partner-aware candidates to the normal
    # return-motif candidate pool, then lets the existing scorers choose. It
    # does not force the final bar and can be disabled independently.
    enabled: true

    # Number of extra partner-aware candidates per return/repeat bar when a
    # partner theme is available. Raise if selected candidates still miss the
    # desired_partner target; lower if generation is slow or themes over-blend.
    extra_candidates: 5

    # These strengths control how strongly proposals borrow partner material
    # before scoring. They are proposal diversity controls, not final rules.
    # Raise contour_strength if A/B melodic shapes still feel unrelated.
    # Raise rhythm_strength if thematic rhythm identity is not transferring.
    # register_strength is only used inside mixed proposals. Standalone
    # register proposals are intentionally not part of the default cycle,
    # because they can sound like local anchor movement rather than theme
    # development.
    contour_strength: 0.62
    rhythm_strength: 0.28
    register_strength: 0.34
    max_pitch_shift: 7

    # harmony_guarded proposals combine contour/rhythm partner influence with
    # a light harmony projection on strong or unresolved structural notes.
    # Raise strength if dual-theme returns still lose harmonic clarity; lower
    # it if the melody becomes too chord-tone heavy.
    harmony_guard_strength: 0.62
    harmony_guard_max_adjust: 4

early_repeat_adaptation:
  # Harmony-aware proposal layer for early repeated motifs before a partner
  # theme exists. It only adds candidates; final selection still comes from the
  # normal development, harmony, and conditional scorers.
  enabled: true

  # Extra candidates per early REPEAT bar with harmony but without dual-theme
  # context. Raise if early repeats show poor harmony diagnostics; lower if
  # repeats lose too much identity.
  extra_candidates: 5

  # anchor_strength moves structurally strong notes toward current chord tones.
  # weak_strength lightly adjusts unresolved non-chord tones. transpose_radius
  # allows a small contour-preserving transposition candidate.
  anchor_strength: 0.72
  weak_strength: 0.38
  transpose_radius: 3
  max_adjust: 5

  scoring:
    # Soft penalty used only for early REPEAT candidate selection. It does not
    # edit notes; it prevents candidates with very low chord-tone support or
    # unresolved non-chord tones from winning just because they preserve motif
    # identity.
    enabled: true
    weight: 1.15
    chord_tone_target: 0.42
    non_chord_resolution_target: 0.72
    unresolved_target: 0.55
    chord_tone_weight: 1.25
    resolution_weight: 1.35
    unresolved_weight: 0.85

monophonic:
  max_overlap: 0.15       # beats. 0=strict, 0.15=legato, higher=loose

skeleton:
  candidate_count: 4      # candidates per bar before skeleton scoring; higher = better fit but slower

  # Register spread controls how far skeleton-conditioned melody may move
  # away from the current tonal/emotional target.
  #
  # Increase these for romantic/pianistic styles (Chopin/Liszt) when the music
  # sounds too flat, over-controlled, or emotionally compressed.
  # Decrease them for contrapuntal/classical/baroque styles when the melody
  # sounds too jumpy or loses tonal focus.
  #
  # candidate_target_spread_base: minimum semitone freedom for every non-cadence bar.
  # candidate_target_spread_tension: extra semitone freedom at high tension.
  # Example:
  #   conservative: base=2, tension=5
  #   Chopin-like:  base=4, tension=9
  candidate_target_spread_base: 4
  candidate_target_spread_tension: 9

  # Register gravity is how strongly generated notes are pulled back toward
  # the skeleton register target after local texture generation.
  # Lower values = freer, wider register motion.
  # Higher values = more coherent but potentially flatter melody.
  register_gravity_contrast: 0.06
  register_gravity_same_theme: 0.14
  register_gravity_variation: 0.15
  register_gravity_cadence_return: 0.22

  # Scoring penalty for mean-register distance from the skeleton target.
  # Lower this if candidates sound too constrained; raise it if sections
  # drift away from the tonal/emotional center.
  register_score_weight: 0.025

  # Tension curve register lift controls how high phrase peaks can rise above
  # the section register center. Increase for more dramatic arcs; decrease
  # for calmer or historically restrained styles.
  tension_register_lift_base: 5
  tension_register_lift_scale: 9

bass:
  enabled: true               # add bass line below melody
  octave_shift: 1             # octaves below sampled pitch
  sustain_fraction: 0.9       # fraction of bar to hold
  velocity_scale: 0.7         # relative to melody velocity

transforms:
  diminution_bias: 0.6    # P(diminution) vs P(augmentation)
  ornament_duration_frac: 0.3  # passing tone duration fraction
  ornament_velocity_offset: 20  # velocity reduction for passing tones
  min_normalized_duration: 0.1  # floor after normalization
